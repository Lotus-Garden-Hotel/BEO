<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Check Venue — Lotus Garden by WH</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<style>
:root{
  --black:#07070a;--dark:#0d0d12;--surface:#121218;--card:#181820;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.14);
  --text:#ede9e0;--muted:#7a7570;--dim:#42404e;
  --gold:#c9a84c;--gold2:#e8c96a;
  --green:#10b981;--red:#ef4444;--blue:#60a5fa;
  --amber:#f59e0b;--teal:#14b8a6;--purple:#a78bfa;
}
body.light-mode{
  --black:#f4f3ef;--dark:#eceae4;--surface:#f8f7f4;--card:#fff;
  --border:rgba(0,0,0,.08);--border2:rgba(0,0,0,.15);
  --text:#1a1814;--muted:#5a5650;--dim:#9a9890;
  --gold:#a07830;--gold2:#c89840;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--black);color:var(--text);font-size:14px;min-height:100vh;}

/* LOGIN */
#login-gate{position:fixed;inset:0;z-index:900;
  background:radial-gradient(ellipse at 60% 20%,rgba(201,168,76,.08) 0%,var(--black) 70%);
  display:flex;align-items:center;justify-content:center;padding:24px;}
#login-gate.hide{display:none;}
.login-card{background:var(--card);border:1px solid rgba(201,168,76,.2);
  border-radius:20px;padding:36px 32px;max-width:360px;width:100%;text-align:center;}
.login-logo{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:700;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px;}
.login-sub{font-size:10px;color:var(--muted);letter-spacing:.2em;text-transform:uppercase;margin-bottom:28px;}
.login-btn{width:100%;padding:14px;border-radius:12px;font-size:13px;font-weight:700;
  background:linear-gradient(135deg,rgba(201,168,76,.2),rgba(201,168,76,.1));
  border:1px solid rgba(201,168,76,.4);color:var(--gold);cursor:pointer;letter-spacing:.05em;transition:all .2s;}
.login-btn:hover{background:rgba(201,168,76,.25);border-color:var(--gold);}
.login-err{font-size:11px;color:var(--red);margin-top:14px;min-height:14px;}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:200;height:54px;
  background:rgba(7,7,10,.96);backdrop-filter:blur(18px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;padding:0 18px;}
body.light-mode .topbar{background:rgba(244,243,239,.96);}
.brand{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700;
  color:var(--gold);white-space:nowrap;flex-shrink:0;}
.brand span{font-size:9px;color:var(--muted);font-family:'DM Sans',sans-serif;
  margin-left:8px;letter-spacing:.15em;text-transform:uppercase;}
.topbar-r{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-left:auto;}
.ctrl-btn{background:var(--card);border:1px solid var(--border2);color:var(--muted);
  border-radius:8px;padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer;
  transition:all .2s;white-space:nowrap;}
.ctrl-btn:hover{border-color:var(--gold);color:var(--gold);}
.btn-theme{background:var(--card);border:1px solid var(--border2);
  border-radius:8px;padding:5px 10px;font-size:13px;cursor:pointer;}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);
  animation:pulse 2s infinite;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* LOADING */
.loading-bar{position:fixed;top:0;left:0;right:0;height:3px;z-index:999;
  background:linear-gradient(90deg,var(--gold),var(--teal));
  display:none;animation:lbar 1.2s ease infinite;}
.loading-bar.show{display:block;}
@keyframes lbar{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}

/* MAIN */
#app{display:none;}
#app.show{display:block;}
.main{padding:14px 16px 80px;max-width:100%;}

/* CONTROLS */
.ctrl-bar{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:12px 16px;margin-bottom:12px;}
.ctrl-group{display:flex;flex-direction:column;gap:4px;}
.ctrl-group label{font-size:9px;color:var(--dim);font-weight:700;letter-spacing:.1em;text-transform:uppercase;}
.ctrl-sel,.ctrl-date{background:var(--surface);border:1px solid var(--border2);color:var(--text);
  border-radius:8px;padding:6px 10px;font-size:12px;cursor:pointer;outline:none;font-weight:600;}
.ctrl-sel:focus,.ctrl-date:focus{border-color:var(--gold);}
.vm-toggle{display:flex;gap:2px;background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:2px;}
.vm-btn{padding:5px 13px;border-radius:6px;font-size:11px;font-weight:700;border:none;
  cursor:pointer;background:transparent;color:var(--muted);transition:all .2s;}
.vm-btn.active{background:var(--gold);color:#000;}
.apply-btn{padding:7px 16px;border-radius:8px;font-size:12px;font-weight:700;
  cursor:pointer;border:none;background:var(--gold);color:#000;align-self:flex-end;}

/* SUMMARY BAR */
.summary-bar{background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:10px 16px;margin-bottom:10px;
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;font-size:11px;}
.sum-item{display:flex;align-items:center;gap:5px;font-weight:600;}
.sum-dot{width:9px;height:9px;border-radius:3px;flex-shrink:0;}
.sum-val{font-family:'DM Mono',monospace;font-size:13px;font-weight:800;}
.conflict-badge{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);
  color:#f87171;border-radius:6px;padding:3px 10px;font-size:10px;font-weight:700;
  animation:conflictPulse 1.5s infinite;}
@keyframes conflictPulse{0%,100%{opacity:1}50%{opacity:.6}}

/* VENUE TABLE WRAPPER */
.tbl-outer{overflow-x:auto;border-radius:14px;border:1px solid var(--border);}
table.vtbl{border-collapse:collapse;width:100%;font-size:12px;}
.vtbl thead{position:sticky;top:54px;z-index:50;}

/* VENUE HEADER */
.th-date-hdr{background:var(--dark);padding:8px 12px;text-align:left;
  font-size:9px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;
  color:var(--dim);border-bottom:2px solid var(--border);
  white-space:nowrap;min-width:80px;position:sticky;left:0;z-index:60;}
.th-venue{background:var(--dark);padding:8px 10px;text-align:center;
  border-bottom:2px solid var(--border);border-left:1px solid var(--border);
  min-width:120px;cursor:default;}
.th-venue-name{font-size:11px;font-weight:800;color:var(--text);
  display:flex;align-items:center;justify-content:center;gap:5px;margin-bottom:5px;}
.th-venue-stats{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;}
.th-stat{font-size:9px;font-weight:700;padding:1px 6px;border-radius:4px;}
.th-stat.confirm{background:rgba(99,102,241,.2);color:#a5b4fc;}
.th-stat.tentative{background:rgba(245,158,11,.2);color:#fcd34d;}
.th-stat.done{background:rgba(16,185,129,.15);color:#6ee7b7;}
.th-occ{font-size:9px;color:var(--dim);margin-top:3px;font-family:'DM Mono',monospace;}

/* DATE CELL */
td.td-date{padding:0;position:sticky;left:0;z-index:10;
  background:var(--card);border-bottom:1px solid var(--border);
  border-right:2px solid var(--border);min-width:80px;width:80px;}
body.light-mode td.td-date{background:var(--card);}
.date-inner{padding:10px 12px;cursor:default;}
.date-num{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:700;
  color:var(--text);line-height:1;}
.date-day{font-size:9px;color:var(--muted);font-weight:700;margin-top:1px;text-transform:uppercase;letter-spacing:.05em;}
.date-mon{font-size:9px;color:var(--dim);letter-spacing:.03em;}
/* Today row */
tr.today-row td.td-date{background:rgba(201,168,76,.08);}
tr.today-row td.td-date .date-num{color:var(--gold);}
tr.today-row td.td-date{border-left:3px solid var(--gold);}
tr.today-row .vcell-wrap{background:rgba(201,168,76,.03);}

/* VENUE CELL */
td.td-cell{padding:4px;border-bottom:1px solid var(--border);
  border-left:1px solid rgba(255,255,255,.04);vertical-align:top;}
.vcell-wrap{border-radius:10px;padding:8px 6px;min-height:74px;
  cursor:pointer;transition:all .15s;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:3px;text-align:center;position:relative;}
.vcell-wrap:hover{filter:brightness(1.18);transform:scale(1.03);}

/* VACANT */
.vc-vacant{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.25);}
.vc-vacant:hover{background:rgba(16,185,129,.2);}
.vc-vacant .vc-icon{font-size:13px;color:var(--green);}
.vc-vacant .vc-label{font-size:9px;font-weight:800;color:var(--green);letter-spacing:.04em;}
.vc-vacant .vc-sub{font-size:8px;color:rgba(16,185,129,.6);margin-top:1px;}

/* CONFIRM */
.vc-confirm{background:rgba(99,102,241,.22);border:1px solid rgba(99,102,241,.4);}
.vc-confirm .vc-status{font-size:9px;font-weight:800;color:#a5b4fc;letter-spacing:.04em;}
.vc-confirm .vc-name{font-size:9px;font-weight:700;color:#c7d2fe;line-height:1.3;}
.vc-confirm .vc-time{font-size:8px;color:rgba(167,139,250,.7);font-family:'DM Mono',monospace;}

/* TENTATIVE */
.vc-tent{background:rgba(245,158,11,.2);border:1px solid rgba(245,158,11,.4);}
.vc-tent .vc-status{font-size:9px;font-weight:800;color:#fcd34d;letter-spacing:.04em;}
.vc-tent .vc-name{font-size:9px;font-weight:700;color:#fde68a;line-height:1.3;}
.vc-tent .vc-time{font-size:8px;color:rgba(245,158,11,.6);font-family:'DM Mono',monospace;}

/* DONE */
.vc-done{background:rgba(107,114,128,.15);border:1px solid rgba(107,114,128,.25);}
.vc-done .vc-status{font-size:9px;font-weight:800;color:var(--muted);letter-spacing:.04em;}
.vc-done .vc-name{font-size:9px;font-weight:600;color:var(--dim);line-height:1.3;}

/* MIXED */
.vc-mixed{background:linear-gradient(135deg,rgba(99,102,241,.2) 50%,rgba(245,158,11,.18) 50%);
  border:1px solid rgba(201,168,76,.3);}
.vc-mixed .vc-count{font-family:'DM Mono',monospace;font-size:16px;font-weight:800;color:#fff;}
.vc-mixed .vc-label{font-size:8px;color:rgba(255,255,255,.6);}

/* CONFLICT */
.vc-conflict{outline:2px solid var(--red);outline-offset:1px;
  animation:conflictGlow 1.2s infinite;}
@keyframes conflictGlow{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.4)}50%{box-shadow:0 0 8px 2px rgba(239,68,68,.3)}}
.conflict-icon{position:absolute;top:-4px;right:-4px;font-size:11px;z-index:5;}

/* NS / CANCEL */
.vc-ns{background:rgba(255,255,255,.04);border:1px dashed var(--border2);}
.vc-ns .vc-status{font-size:9px;color:var(--dim);font-weight:700;}
.vc-ns .vc-name{font-size:8px;color:var(--dim);}

/* BOTTOM BAR */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:rgba(7,7,10,.95);backdrop-filter:blur(14px);
  border-top:1px solid var(--border);height:56px;
  display:flex;align-items:center;justify-content:space-around;padding:0 16px;}
body.light-mode .bottom-bar{background:rgba(244,243,239,.96);}
.bb-item{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:default;}
.bb-val{font-family:'DM Mono',monospace;font-size:18px;font-weight:800;line-height:1;}
.bb-lbl{font-size:8px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;}
.bb-item.vacant .bb-val{color:var(--green);}
.bb-item.vacant .bb-lbl{color:rgba(16,185,129,.6);}
.bb-item.tent .bb-val{color:var(--amber);}
.bb-item.tent .bb-lbl{color:rgba(245,158,11,.6);}
.bb-item.confirm .bb-val{color:#a5b4fc;}
.bb-item.confirm .bb-lbl{color:rgba(99,102,241,.6);}
.bb-item.done .bb-val{color:var(--muted);}
.bb-item.done .bb-lbl{color:var(--dim);}
.bb-item.conflict .bb-val{color:var(--red);}
.bb-item.conflict .bb-lbl{color:rgba(239,68,68,.6);}
.bb-item.days .bb-val{color:var(--gold);}
.bb-item.days .bb-lbl{color:rgba(201,168,76,.6);}
.bb-sep{width:1px;height:28px;background:var(--border);}

/* POPUP */
.popup-overlay{position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.65);
  backdrop-filter:blur(5px);display:none;align-items:center;justify-content:center;padding:16px;}
.popup-overlay.show{display:flex;}
.popup-card{background:var(--card);border:1px solid var(--border2);
  border-radius:20px;max-width:480px;width:100%;max-height:88vh;overflow-y:auto;
  animation:popUp .22s cubic-bezier(.175,.885,.32,1.275) both;}
@keyframes popUp{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:none}}
.popup-head{padding:18px 20px 12px;border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;justify-content:space-between;}
.popup-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:var(--gold);}
.popup-sub{font-size:10px;color:var(--dim);margin-top:2px;}
.popup-close{background:none;border:none;color:var(--dim);font-size:20px;cursor:pointer;padding:0 4px;}
.popup-close:hover{color:var(--text);}
.popup-body{padding:14px 20px 18px;}
.popup-event{background:var(--surface);border-radius:12px;padding:13px 15px;
  margin-bottom:10px;border:1px solid var(--border);}
.pev-status{display:inline-block;padding:3px 10px;border-radius:6px;
  font-size:9px;font-weight:800;letter-spacing:.06em;margin-bottom:8px;}
.pev-status.confirm{background:rgba(99,102,241,.2);color:#a5b4fc;border:1px solid rgba(99,102,241,.3);}
.pev-status.tentative{background:rgba(245,158,11,.18);color:#fcd34d;border:1px solid rgba(245,158,11,.3);}
.pev-status.done{background:rgba(107,114,128,.15);color:var(--muted);}
.pev-customer{font-size:16px;font-weight:700;color:var(--text);margin-bottom:10px;}
.pev-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.pev-field label{font-size:9px;color:var(--dim);letter-spacing:.08em;text-transform:uppercase;
  font-weight:700;display:block;margin-bottom:2px;}
.pev-field span{font-size:12px;font-weight:600;}
.pev-btns{display:flex;gap:8px;margin-top:12px;}
.btn-edit{flex:1;padding:9px;border-radius:9px;font-size:11px;font-weight:700;cursor:pointer;
  background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.3);color:var(--gold);transition:all .2s;}
.btn-edit:hover{background:rgba(201,168,76,.28);}
.vacant-popup{text-align:center;padding:8px 0;}
.vp-icon{font-size:44px;margin-bottom:10px;}
.vp-title{font-size:17px;font-weight:700;color:var(--green);margin-bottom:5px;}
.vp-sub{font-size:12px;color:var(--muted);margin-bottom:18px;}
.btn-add{width:100%;padding:12px;border-radius:10px;font-size:13px;font-weight:700;
  cursor:pointer;background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.35);
  color:var(--green);transition:all .2s;letter-spacing:.03em;}
.btn-add:hover{background:rgba(16,185,129,.28);}

/* PRINT MODE */
@media print{
  .topbar,.ctrl-bar,.bottom-bar,.popup-overlay,.loading-bar{display:none!important;}
  .main{padding:8px;}
  .tbl-outer{border:none;}
  body{background:#fff;color:#000;}
  .vcell-wrap:hover{transform:none;filter:none;}
}
body.print-preview .topbar,
body.print-preview .ctrl-bar,
body.print-preview .bottom-bar{display:none!important;}
body.print-preview .main{padding:8px;}

/* TOAST */
#toast{position:fixed;bottom:66px;left:50%;transform:translateX(-50%);
  background:var(--card);border:1px solid var(--border2);
  padding:10px 20px;border-radius:12px;font-size:12px;font-weight:600;
  z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;
  box-shadow:0 4px 20px rgba(0,0,0,.4);}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px) translateX(-50%)}to{opacity:1;transform:translateY(0) translateX(-50%)}}
</style>
</head>
<body>

<div id="login-gate">
  <div class="login-card">
    <div class="login-logo">◆ Check Venue</div>
    <div class="login-sub">Lotus Garden by WH · Venue Availability</div>
    <button class="login-btn" onclick="doLogin()">🔐 Login dengan Google</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<div class="loading-bar" id="loading-bar"></div>

<div class="topbar">
  <div class="brand">◆ Check Venue <span>Lotus Garden by WH</span></div>
  <div class="topbar-r">
    <div class="live-dot"></div>
    <span style="font-size:10px;color:var(--muted)" id="last-sync"></span>
    <button class="ctrl-btn" onclick="loadData()">↺ Refresh</button>
    <button class="ctrl-btn" onclick="togglePrint()">🖨 Print</button>
    <button class="btn-theme" id="btn-theme" onclick="toggleTheme()">🌙</button>
    <span id="topbar-user" style="font-size:10px;color:var(--muted);max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></span>
    <button class="ctrl-btn" onclick="logoutUser()" style="color:var(--red)">⎋ Keluar</button>
  </div>
</div>

<div id="app">
  <div class="main">

    <!-- Controls -->
    <div class="ctrl-bar" id="ctrl-bar">
      <div class="ctrl-group">
        <label>Tampilan</label>
        <div class="vm-toggle">
          <button class="vm-btn active" id="vm-month" onclick="setViewMode('month')">Per Bulan</button>
          <button class="vm-btn" id="vm-range" onclick="setViewMode('range')">Range</button>
        </div>
      </div>
      <div class="ctrl-group" id="grp-month">
        <label>Bulan</label>
        <select class="ctrl-sel" id="sel-month" onchange="renderTable()">
          <option value="JANUARI">Januari</option><option value="FEBRUARI">Februari</option>
          <option value="MARET">Maret</option><option value="APRIL">April</option>
          <option value="MEI">Mei</option><option value="JUNI">Juni</option>
          <option value="JULI">Juli</option><option value="AGUSTUS">Agustus</option>
          <option value="SEPTEMBER">September</option><option value="OKTOBER">Oktober</option>
          <option value="NOVEMBER">November</option><option value="DESEMBER">Desember</option>
        </select>
      </div>
      <div class="ctrl-group" id="grp-from" style="display:none">
        <label>Dari</label>
        <input type="date" class="ctrl-date" id="date-from">
      </div>
      <div class="ctrl-group" id="grp-to" style="display:none">
        <label>Sampai</label>
        <input type="date" class="ctrl-date" id="date-to">
      </div>
      <button class="apply-btn" id="apply-btn" style="display:none" onclick="renderTable()">▶ Tampilkan</button>
      <div class="ctrl-group">
        <label>Status</label>
        <select class="ctrl-sel" id="sel-status" onchange="renderTable()">
          <option value="ALL">Semua</option>
          <option value="CONFIRM">Confirm</option>
          <option value="TENTATIVE">Tentative</option>
          <option value="DONE">Done</option>
        </select>
      </div>
    </div>

    <!-- Summary -->
    <div class="summary-bar" id="summary-bar" style="display:none"></div>

    <!-- Table -->
    <div class="tbl-outer" id="tbl-outer">
      <div style="padding:50px;text-align:center;color:var(--dim);">Memuat data...</div>
    </div>

  </div>
</div>

<!-- Bottom bar -->
<div class="bottom-bar" id="bottom-bar" style="display:none">
  <div class="bb-item vacant"><div class="bb-val" id="bb-vacant">0</div><div class="bb-lbl">Kosong</div></div>
  <div class="bb-sep"></div>
  <div class="bb-item tent"><div class="bb-val" id="bb-tent">0</div><div class="bb-lbl">Tentative</div></div>
  <div class="bb-sep"></div>
  <div class="bb-item confirm"><div class="bb-val" id="bb-confirm">0</div><div class="bb-lbl">Confirm</div></div>
  <div class="bb-sep"></div>
  <div class="bb-item done"><div class="bb-val" id="bb-done">0</div><div class="bb-lbl">Done</div></div>
  <div class="bb-sep"></div>
  <div class="bb-item conflict"><div class="bb-val" id="bb-conflict">0</div><div class="bb-lbl">⚠ Conflict</div></div>
  <div class="bb-sep"></div>
  <div class="bb-item days"><div class="bb-val" id="bb-days">0</div><div class="bb-lbl">Hari</div></div>
</div>

<!-- Popup -->
<div class="popup-overlay" id="popup" onclick="if(event.target===this)closePopup()">
  <div class="popup-card">
    <div class="popup-head">
      <div><div class="popup-title" id="pop-title"></div><div class="popup-sub" id="pop-sub"></div></div>
      <button class="popup-close" onclick="closePopup()">✕</button>
    </div>
    <div class="popup-body" id="pop-body"></div>
  </div>
</div>

<div id="toast"></div>

<script>
const FIREBASE_CONFIG={
  apiKey:'AIzaSyCX0--DGM_tp_2y7hBbrGiMfeVyToVD4zM',
  authDomain:'banquet-dashboard-kediri.firebaseapp.com',
  projectId:'banquet-dashboard-kediri',
  storageBucket:'banquet-dashboard-kediri.firebasestorage.app',
  messagingSenderId:'716626784276',
  appId:'1:716626784276:web:4f7d4d51dace341d21b701'
};
const GAS_URL='https://script.google.com/macros/s/AKfycbzj5FUKzhGo2j1RXobsCyHZ7dcfLD-eF4Z-rf_poLFTvevSAaxdVb_OBaJtThjiLT8N/exec';
const MONTH_IDX={JANUARI:0,FEBRUARI:1,MARET:2,APRIL:3,MEI:4,JUNI:5,JULI:6,AGUSTUS:7,SEPTEMBER:8,OKTOBER:9,NOVEMBER:10,DESEMBER:11};
const MONTH_NAMES=['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
const MONTH_KEYS=['JANUARI','FEBRUARI','MARET','APRIL','MEI','JUNI','JULI','AGUSTUS','SEPTEMBER','OKTOBER','NOVEMBER','DESEMBER'];
const DAY_SHORT=['Min','Sen','Sel','Rab','Kam','Jum','Sab'];

let _auth,_provider,_idToken='',_authVerified=false,_authInFlight=false;
let _allEvents=[],_venues=[],_viewMode='month',_autoTimer=null;

// ── AUTH ──
firebase.initializeApp(FIREBASE_CONFIG);
_auth=firebase.auth();
_provider=new firebase.auth.GoogleAuthProvider();
_auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).catch(()=>{});

_auth.onAuthStateChanged(async user=>{
  const gate=document.getElementById('login-gate');
  const err=document.getElementById('login-err');
  if(!user){if(!_authVerified){gate.classList.remove('hide');document.getElementById('app').classList.remove('show');}return;}
  if(_authVerified||_authInFlight)return;
  _authInFlight=true;
  try{
    _idToken=await user.getIdToken(true);
    let res=null;
    try{
      const ctrl=new AbortController();const t=setTimeout(()=>ctrl.abort(),10000);
      const resp=await fetch(GAS_URL+'?'+new URLSearchParams({action:'CHECK_ACCESS',idToken:_idToken,from:'venue'}),{redirect:'follow',signal:ctrl.signal});
      clearTimeout(t);res=await resp.json();
    }catch(e){res=null;}
    if(res&&!res.ok&&res.msg&&res.msg.includes('tidak terdaftar')){
      _auth.signOut();err.textContent='⚠ Akun tidak diizinkan.';_authVerified=false;_authInFlight=false;return;
    }
    _authVerified=true;
    gate.classList.add('hide');document.getElementById('app').classList.add('show');
    document.getElementById('topbar-user').textContent=user.email||'';
    err.textContent='';applyTheme();
    initDefaults();await loadData();startAutoRefresh();
  }catch(e){
    if(_auth.currentUser){_authVerified=true;document.getElementById('login-gate').classList.add('hide');document.getElementById('app').classList.add('show');initDefaults();await loadData();}
    else err.textContent='⚠ Gagal verifikasi. Refresh halaman.';
  }finally{_authInFlight=false;}
});

function doLogin(){
  document.getElementById('login-err').textContent='';
  _auth.signInWithPopup(_provider).catch(e=>{
    document.getElementById('login-err').textContent=
      e.code==='auth/popup-blocked'?'⚠ Izinkan popup di browser.':
      e.code==='auth/popup-closed-by-user'?'':'⚠ '+e.message;
  });
}
function logoutUser(){_auth.signOut();_authVerified=false;_authInFlight=false;_allEvents=[];clearInterval(_autoTimer);}

// ── INIT ──
function initDefaults(){
  const now=new Date();
  document.getElementById('sel-month').value=MONTH_KEYS[now.getMonth()]||'JANUARI';
  const y=now.getFullYear(),m=now.getMonth();
  document.getElementById('date-from').value=new Date(y,m,1).toISOString().slice(0,10);
  document.getElementById('date-to').value=new Date(y,m+1,0).toISOString().slice(0,10);
}

// ── DATA ──
async function loadData(){
  showLoading();
  try{
    _idToken=await _auth.currentUser.getIdToken(true);
    const res=await (await fetch(GAS_URL+'?'+new URLSearchParams({action:'READ_REPORT',idToken:_idToken}),{redirect:'follow'})).json();
    if(!res.ok){toast('⚠ '+res.msg);hideLoading();return;}
    _allEvents=[];
    Object.entries(res.report||{}).forEach(([month,mData])=>{
      (mData.events||[]).forEach(ev=>{
        const d=parseInt(ev.date),mi=MONTH_IDX[month]??0;
        const dateObj=(d&&!isNaN(d))?new Date(2026,mi,d):null;
        _allEvents.push({...ev,_month:month,_dateObj:dateObj,_venueKey:(ev.venue||'Unknown').trim()});
      });
    });
    _venues=[...new Set(_allEvents.map(e=>e._venueKey))].filter(Boolean).sort();
    document.getElementById('last-sync').textContent='Sync '+new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
    renderTable();
  }catch(e){toast('⚠ '+e.message);}
  hideLoading();
}
function startAutoRefresh(){clearInterval(_autoTimer);_autoTimer=setInterval(loadData,5*60*1000);}

// ── VIEW MODE ──
function setViewMode(m){
  _viewMode=m;
  document.getElementById('vm-month').classList.toggle('active',m==='month');
  document.getElementById('vm-range').classList.toggle('active',m==='range');
  document.getElementById('grp-month').style.display=m==='month'?'flex':'none';
  document.getElementById('grp-from').style.display=m==='range'?'flex':'none';
  document.getElementById('grp-to').style.display=m==='range'?'flex':'none';
  document.getElementById('apply-btn').style.display=m==='range'?'flex':'none';
  if(m==='month')renderTable();
}

// ── DATE RANGE ──
function getRange(){
  if(_viewMode==='month'){
    const key=document.getElementById('sel-month').value;
    const mi=MONTH_IDX[key]??0;
    return{from:new Date(2026,mi,1),to:new Date(2026,mi+1,0),label:MONTH_NAMES[mi]+' 2026'};
  }
  const f=document.getElementById('date-from').value;
  const t=document.getElementById('date-to').value;
  if(!f||!t)return null;
  return{from:new Date(f+'T00:00:00'),to:new Date(t+'T00:00:00'),label:f+' s/d '+t};
}
function getDays(from,to){
  const days=[];const d=new Date(from);
  while(d<=to){days.push(new Date(d));d.setDate(d.getDate()+1);}
  return days;
}

// ── TIME OVERLAP CHECK ──
function parseTimeRange(timeStr){
  if(!timeStr||timeStr==='—')return null;
  const parts=timeStr.replace(/\./g,':').split('-');
  const toMin=s=>{const[h,m]=(s||'').trim().split(':');return parseInt(h||0)*60+parseInt(m||0);};
  const s=toMin(parts[0]),e=toMin(parts[1]||'23:59');
  return(s>0||e>0)?{s,e:e||s+120}:null;
}
function hasOverlap(evs){
  const times=evs.map(e=>parseTimeRange(e.time)).filter(Boolean);
  for(let i=0;i<times.length;i++)
    for(let j=i+1;j<times.length;j++)
      if(times[i].s<times[j].e&&times[j].s<times[i].e)return true;
  return false;
}

// ── VENUE ICON ──
function venueIcon(name){
  const n=name.toLowerCase();
  if(n.includes('ball'))return'🏛';
  if(n.includes('vip'))return'⭐';
  if(n.includes('teratai'))return'🌺';
  if(n.includes('fox')||n.includes('steak'))return'🥩';
  if(n.includes('meet'))return'🤝';
  if(n.includes('rest')||n.includes('dining'))return'🍽';
  if(n.includes('garden')||n.includes('outdoor'))return'🌿';
  if(n.includes('pool'))return'🏊';
  return'🏠';
}

// ── RENDER TABLE ──
function renderTable(){
  const range=getRange();
  if(!range){document.getElementById('tbl-outer').innerHTML='<div style="padding:30px;text-align:center;color:var(--dim)">Pilih rentang tanggal</div>';return;}
  if(!_venues.length){document.getElementById('tbl-outer').innerHTML='<div style="padding:30px;text-align:center;color:var(--dim)">Belum ada data</div>';return;}

  const days=getDays(range.from,range.to);
  const today=new Date();
  const stFilter=document.getElementById('sel-status').value;

  // Build event map: venue → dateKey → [events]
  const evMap={};
  _venues.forEach(v=>{evMap[v]={};});
  _allEvents.forEach(ev=>{
    if(!ev._dateObj)return;
    if(stFilter!=='ALL'&&ev.status!==stFilter)return;
    const ed=new Date(ev._dateObj.getFullYear(),ev._dateObj.getMonth(),ev._dateObj.getDate());
    if(ed<new Date(range.from.getFullYear(),range.from.getMonth(),range.from.getDate()))return;
    if(ed>new Date(range.to.getFullYear(),range.to.getMonth(),range.to.getDate()))return;
    const k=ev._dateObj.toISOString().slice(0,10);
    if(!evMap[ev._venueKey])evMap[ev._venueKey]={};
    if(!evMap[ev._venueKey][k])evMap[ev._venueKey][k]=[];
    evMap[ev._venueKey][k].push(ev);
  });

  // Stats
  let totalVacant=0,totalTent=0,totalConfirm=0,totalDone=0,totalConflict=0;
  const venueStats={};
  _venues.forEach(v=>{venueStats[v]={confirm:0,tent:0,done:0,occ:0};});

  days.forEach(d=>{
    const k=d.toISOString().slice(0,10);
    _venues.forEach(v=>{
      const evs=evMap[v]?.[k]||[];
      const activeEvs=evs.filter(e=>e.status!=='CANCEL');
      if(activeEvs.length===0)totalVacant++;
      activeEvs.forEach(e=>{
        if(e.status==='CONFIRM'){totalConfirm++;venueStats[v].confirm++;venueStats[v].occ++;}
        else if(e.status==='TENTATIVE'){totalTent++;venueStats[v].tent++;venueStats[v].occ++;}
        else if(e.status==='DONE'){totalDone++;venueStats[v].done++;venueStats[v].occ++;}
      });
      if(activeEvs.length>1&&hasOverlap(activeEvs))totalConflict++;
    });
  });

  // Build OCC% per venue
  const totalSlots=days.length;

  // Header row
  const thVenues=_venues.map(v=>{
    const st=venueStats[v];
    const occ=totalSlots>0?Math.round(st.occ/totalSlots*100):0;
    const icon=venueIcon(v);
    return`<th class="th-venue">
      <div class="th-venue-name">${icon} ${v}</div>
      <div class="th-venue-stats">
        ${st.confirm?`<span class="th-stat confirm">🔵${st.confirm}</span>`:''}
        ${st.tent?`<span class="th-stat tentative">🟡${st.tent}</span>`:''}
        ${st.done?`<span class="th-stat done">✓${st.done}</span>`:''}
      </div>
      <div class="th-occ">${occ}% terisi</div>
    </th>`;
  }).join('');

  // Rows
  const rows=days.map(d=>{
    const k=d.toISOString().slice(0,10);
    const isToday=d.toDateString()===today.toDateString();
    const dayNum=d.getDate();
    const dayName=DAY_SHORT[d.getDay()];
    const monName=MONTH_NAMES[d.getMonth()].slice(0,3);
    const cells=_venues.map(v=>{
      const evs=(evMap[v]?.[k]||[]).filter(e=>e.status!=='CANCEL');
      const conflict=evs.length>1&&hasOverlap(evs);
      const conflictEl=conflict?`<span class="conflict-icon">⚠</span>`:'';
      if(evs.length===0){
        const mKey=MONTH_KEYS[d.getMonth()];
        return`<td class="td-cell">
          <div class="vcell-wrap vc-vacant${isToday?' today-col':''}"
            onclick="openAvail('${v}','${dayNum}','${dayName} ${dayNum} ${monName}','${mKey}')">
            ${conflictEl}
            <div class="vc-icon">✓</div>
            <div class="vc-label">VACANT</div>
            <div class="vc-sub">Tap isi</div>
          </div></td>`;
      }
      const hasC=evs.some(e=>e.status==='CONFIRM');
      const hasT=evs.some(e=>e.status==='TENTATIVE');
      const hasD=evs.some(e=>e.status==='DONE');
      let cls='vc-done';
      if(hasC&&hasT)cls='vc-mixed';
      else if(hasC)cls='vc-confirm';
      else if(hasT)cls='vc-tent';

      if(cls==='vc-mixed'){
        const evData=encodeEvs(evs);
        return`<td class="td-cell">
          <div class="vcell-wrap ${cls}${conflict?' vc-conflict':''}" onclick="openEvs(${evData},'${v}','${dayName} ${dayNum} ${monName}')">
            ${conflictEl}
            <div class="vc-count">${evs.length}</div>
            <div class="vc-label">event</div>
          </div></td>`;
      }
      // Single status — show first event detail
      const ev=evs[0];
      const label={CONFIRM:'✓ CONF',TENTATIVE:'~ TENT',DONE:'✓ DONE'}[ev.status]||ev.status;
      const shortName=(ev.customer||'').split(' ').slice(0,3).join(' ');
      const evData=encodeEvs(evs);
      return`<td class="td-cell">
        <div class="vcell-wrap ${cls}${conflict?' vc-conflict':''}" onclick="openEvs(${evData},'${v}','${dayName} ${dayNum} ${monName}')">
          ${conflictEl}
          <div class="vc-status">${label}${evs.length>1?' ×'+evs.length:''}</div>
          <div class="vc-name">${shortName}</div>
          <div class="vc-time">${ev.time||''}</div>
        </div></td>`;
    }).join('');

    return`<tr class="${isToday?'today-row':''}">
      <td class="td-date">
        <div class="date-inner">
          <div class="date-num">${dayNum}</div>
          <div class="date-day">${dayName}${isToday?' 🟡':''}</div>
          <div class="date-mon">${monName}</div>
        </div>
      </td>
      ${cells}
    </tr>`;
  }).join('');

  document.getElementById('tbl-outer').innerHTML=`
    <table class="vtbl">
      <thead><tr>
        <th class="th-date-hdr">TANGGAL</th>${thVenues}
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;

  // Summary bar
  const smBar=document.getElementById('summary-bar');
  smBar.style.display='flex';
  smBar.innerHTML=`
    <strong style="color:var(--text)">${range.label}</strong>
    <span style="color:var(--green);font-weight:700">✓ ${totalVacant} slot kosong tersedia</span>
    ${totalConflict?`<span class="conflict-badge">⚠ ${totalConflict} konflik waktu</span>`:''}
    <span style="margin-left:auto;font-size:10px;color:var(--dim)">${days.length} hari · ${_venues.length} venue · Total ${totalConfirm+totalTent+totalDone} event</span>`;

  // Bottom bar
  document.getElementById('bottom-bar').style.display='flex';
  document.getElementById('bb-vacant').textContent=totalVacant;
  document.getElementById('bb-tent').textContent=totalTent;
  document.getElementById('bb-confirm').textContent=totalConfirm;
  document.getElementById('bb-done').textContent=totalDone;
  document.getElementById('bb-conflict').textContent=totalConflict;
  document.getElementById('bb-days').textContent=days.length;
}

function encodeEvs(evs){
  return"'"+btoa(unescape(encodeURIComponent(JSON.stringify(evs))))+"'";
}
function decodeEvs(s){
  try{return JSON.parse(decodeURIComponent(escape(atob(s))));}
  catch(_){return[];}
}

// ── POPUPS ──
function openEvs(encoded,venue,dayStr){
  const evs=decodeEvs(encoded);
  document.getElementById('pop-title').textContent=venue;
  document.getElementById('pop-sub').textContent=dayStr+' · '+evs.length+' event';
  document.getElementById('pop-body').innerHTML=evs.map(ev=>{
    const cls=(ev.status||'').toLowerCase();
    const lbl={CONFIRM:'✓ CONFIRM',TENTATIVE:'~ TENTATIVE',DONE:'✓ DONE',CANCEL:'✗ CANCEL'}[ev.status]||ev.status;
    return`<div class="popup-event">
      <span class="pev-status ${cls}">${lbl}</span>
      <div class="pev-customer">${ev.customer||'—'}</div>
      <div class="pev-grid">
        <div class="pev-field"><label>Waktu</label><span>${ev.time||'—'}</span></div>
        <div class="pev-field"><label>Pax</label><span>${ev.pax||'—'}</span></div>
        <div class="pev-field"><label>Package</label><span>${ev.package||'—'}</span></div>
        <div class="pev-field"><label>Sales</label><span>${ev.sales||'—'}</span></div>
      </div>
      <div class="pev-btns">
        <button class="btn-edit" onclick="goLiveEntry('${ev.date}','${ev._venueKey||ev.venue||venue}','${ev._month}')">✏ Edit di Live Entry</button>
      </div>
    </div>`;
  }).join('');
  document.getElementById('popup').classList.add('show');
}

function openAvail(venue,day,dayStr,monthKey){
  document.getElementById('pop-title').textContent='Tersedia';
  document.getElementById('pop-sub').textContent=venue+' · '+dayStr;
  document.getElementById('pop-body').innerHTML=`
    <div class="vacant-popup">
      <div class="vp-icon">✅</div>
      <div class="vp-title">${venue}</div>
      <div class="vp-sub">${dayStr} · Tidak ada booking</div>
      <button class="btn-add" onclick="goLiveEntry('${day}','${venue}','${monthKey}');closePopup()">
        ➕ Tambah Booking di Live Entry
      </button>
    </div>`;
  document.getElementById('popup').classList.add('show');
}

function closePopup(){document.getElementById('popup').classList.remove('show');}

function goLiveEntry(date,venue,bulan){
  const base=window.location.href.replace(/[^\/]*$/,'');
  window.open(base+'entry.html?prefill_date='+encodeURIComponent(date)
    +'&prefill_venue='+encodeURIComponent(venue)
    +'&prefill_month='+encodeURIComponent(bulan),'_blank');
}

// ── PRINT ──
function togglePrint(){
  const is=document.body.classList.toggle('print-preview');
  if(is){window.print();setTimeout(()=>document.body.classList.remove('print-preview'),1000);}
}

// ── UTILS ──
function showLoading(){document.getElementById('loading-bar').classList.add('show');}
function hideLoading(){document.getElementById('loading-bar').classList.remove('show');}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.opacity='1';t.style.animation='fadeUp .3s ease both';
  clearTimeout(t._t);t._t=setTimeout(()=>t.style.opacity='0',2800);
}
function toggleTheme(){
  const l=document.body.classList.toggle('light-mode');
  document.getElementById('btn-theme').textContent=l?'🌞':'🌙';
  try{localStorage.setItem('cv_theme',l?'light':'dark');}catch(_){}
}
function applyTheme(){
  try{if(localStorage.getItem('cv_theme')==='light'){
    document.body.classList.add('light-mode');
    const b=document.getElementById('btn-theme');if(b)b.textContent='🌞';
  }}catch(_){}
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closePopup();});
applyTheme();
</script>
</body>
