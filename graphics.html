<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banquet Analytics - LOTUS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        :root { --bg: #020617; --card: rgba(255, 255, 255, 0.05); }
        body.night-mode { --bg: #000000 !important; --card: rgba(15, 23, 42, 0.8) !important; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: #f8fafc; padding: 15px; transition: 0.3s; min-height: 100vh; padding-bottom: 30px; }
        .card-base { background: var(--card); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 1.5rem; padding: 15px; }
        .btn-nav:active { transform: scale(0.95); opacity: 0.8; }
    </style>
</head>
<body>

    <!-- [SEC-01] Login gate — sama seperti index.html -->
    <div id="login-gate" class="fixed inset-0 flex flex-col items-center justify-center p-8 z-50" style="background: radial-gradient(circle at top right, #1e1b4b 0%, #020617 100%);">
        <div style="background: rgba(15,23,42,0.8); border: 1px solid rgba(99,102,241,0.2); border-radius: 2rem;" class="w-full max-w-sm p-10 text-center space-y-8 backdrop-blur-3xl">
            <div>
                <div class="w-16 h-16 bg-gradient-to-tr from-indigo-600 to-violet-500 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-xl" style="transform:rotate(3deg)">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
                </div>
                <h2 class="text-2xl font-black tracking-tight text-white italic uppercase">Analytics</h2>
                <p class="text-xs font-bold text-slate-500 tracking-widest uppercase mt-1">Lotus Garden Kediri</p>
            </div>
            <button onclick="loginWithGoogle()" style="background:#fff;color:#1f2937;font-weight:700;border:1px solid #e5e7eb;" class="w-full py-4 rounded-2xl flex items-center justify-center gap-3 shadow-xl">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5">
                <span class="text-sm tracking-tight uppercase font-black">Authorize System</span>
            </button>
            <p id="auth-error" class="text-xs text-rose-400 hidden">Akun tidak diizinkan akses sistem ini.</p>
        </div>
    </div>

    <div id="app-shell" class="hidden">
    <div class="flex items-center justify-between mb-6 px-1">
        <div class="flex items-center gap-4">
            <button onclick="window.location.href='index.html'" class="btn-nav bg-white/10 px-3 py-1.5 rounded-xl text-indigo-400 font-bold text-[10px] border border-white/5 tracking-tighter">← DASHBOARD</button>
            <h1 class="text-lg font-black uppercase italic tracking-tighter">Analytics <span class="text-indigo-500 text-xs">V.6.4</span></h1>
        </div>
        <button onclick="toggleNightMode()" class="text-xs">🌙</button>
    </div>

    <div class="space-y-4">
        <div class="card-base">
            <div class="flex justify-between items-start mb-6">
                <div>
                    <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest leading-none mb-1">Revenue Stream</p>
                    <h2 class="text-xs font-bold text-indigo-300">Monthly Achievement (%)</h2>
                </div>
                <div class="text-right">
                    <p id="total-annual" class="text-[12px] font-black text-emerald-400">Rp0</p>
                    <p class="text-[7px] font-bold text-slate-500 uppercase leading-none">Nett YTD (Conf+Done)</p>
                </div>
            </div>
            <div class="relative h-[280px]"><canvas id="revenueChart"></canvas></div>
        </div>

        <div class="grid grid-cols-2 gap-2">
            <div class="card-base text-center border-b-2 border-emerald-500 py-3">
                <p class="text-[7px] font-black text-slate-500 uppercase mb-1 tracking-widest">Annual Progress</p>
                <h2 id="annual-progress" class="text-lg font-black text-emerald-400">0%</h2>
            </div>
            <div class="card-base text-center border-b-2 border-amber-500 py-3">
                <p class="text-[7px] font-black text-slate-500 uppercase mb-1 tracking-widest">Total Pax YTD</p>
                <h2 id="total-pax-count" class="text-lg font-black text-amber-400">0</h2>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-2">
            <div class="card-base text-center border-b-2 border-indigo-500 py-3">
                <p class="text-[7px] font-black text-slate-500 uppercase mb-1 tracking-widest">Avg Achievement</p>
                <h2 id="avg-ach" class="text-lg font-black text-indigo-400">0%</h2>
            </div>
            <div class="card-base text-center border-b-2 border-slate-700 py-3">
                <p class="text-[7px] font-black text-slate-500 uppercase mb-1 tracking-widest">Total Intensity (All)</p>
                <h2 id="total-event-count" class="text-lg font-black text-white">0</h2>
            </div>
        </div>

        <div class="card-base">
            <p class="text-[8px] font-black text-slate-500 uppercase tracking-[0.2em] mb-4 text-center">Venues Usage Intensity (Confirm+Done+Tentative)</p>
            <div id="venue-list" class="grid grid-cols-2 gap-2"></div>
        </div>
    </div>

    <script>
        // [SEC-01] Firebase Auth — sama dengan index.html
        const firebaseConfig = {
            apiKey: "AIzaSyCX0--DGM_tp_2y7hBbrGiMfeVyToVD4zM",
            authDomain: "banquet-dashboard-kediri.firebaseapp.com",
            projectId: "banquet-dashboard-kediri",
            storageBucket: "banquet-dashboard-kediri.firebasestorage.app",
            messagingSenderId: "716626784276",
            appId: "1:716626784276:web:4f7d4d51dace341d21b701"
        };
        firebase.initializeApp(firebaseConfig);
        const _provider = new firebase.auth.GoogleAuthProvider();

        const GAS_URL    = 'https://script.google.com/macros/s/AKfycbxN-scggECOGZXqsOuII_AftWN8VXkRR9qaj_wbX6VXwqGespdwvCVWA-SirJs_0fXc/exec';
        const TIMEOUT_MS = 12000;
        const TOKEN_TTL_MS = 55 * 60 * 1000;
        let _cachedToken = null, _tokenFetchedAt = 0;

        async function getIdToken() {
            const user = firebase.auth().currentUser;
            if (!user) throw new Error('Sesi habis.');
            const now = Date.now();
            if (_cachedToken && (now - _tokenFetchedAt) < TOKEN_TTL_MS) return _cachedToken;
            const fresh = await user.getIdToken(true);
            _cachedToken = fresh; _tokenFetchedAt = now;
            return fresh;
        }

        async function gasRaw(params) {
            const ctrl = new AbortController();
            const timer = setTimeout(() => ctrl.abort(), TIMEOUT_MS);
            try {
                const res = await fetch(GAS_URL + '?' + new URLSearchParams(params), { redirect: 'follow', signal: ctrl.signal });
                return await res.json();
            } catch(e) {
                if (e.name === 'AbortError') throw new Error('Timeout');
                throw e;
            } finally { clearTimeout(timer); }
        }

        // [AUTH] Guard stabil — sama persis dengan entry_live_secure.html
        let _authVerified = false;
        let _authInFlight = false;

        firebase.auth().onAuthStateChanged(async (user) => {
            const gate  = document.getElementById('login-gate');
            const shell = document.getElementById('app-shell');
            const err   = document.getElementById('auth-error');

            if (!user) {
                if (!_authVerified) {
                    gate.classList.remove('hidden');
                    shell.classList.add('hidden');
                }
                return;
            }

            if (_authVerified) return;
            if (_authInFlight) return;
            _authInFlight = true;

            try {
                const idToken = await user.getIdToken(true);

                let res;
                try {
                    res = await gasRaw({ action: 'CHECK_ACCESS', idToken });
                } catch(netErr) {
                    // Network error — JANGAN signOut
                    err.textContent = '⚠ Tidak dapat terhubung ke server. Periksa internet lalu refresh.';
                    err.classList.remove('hidden');
                    _authInFlight = false;
                    return;
                }

                if (res.ok && res.allowed) {
                    // ✅ Diizinkan
                    _authVerified = true;
                    _cachedToken = idToken; _tokenFetchedAt = Date.now();
                    err.classList.add('hidden');
                    gate.classList.add('hidden');
                    shell.classList.remove('hidden');
                    const savedMode = localStorage.getItem('nightMode');
                    if (savedMode === 'enabled') document.body.classList.add('night-mode');
                    setTimeout(fetchData, 50);

                } else if (res.msg && res.msg.includes('tidak terdaftar')) {
                    // ❌ Email tidak ada di whitelist — signOut sah
                    firebase.auth().signOut();
                    err.textContent = 'Akun tidak diizinkan akses sistem ini.';
                    err.classList.remove('hidden');

                } else {
                    // ❌ GAS error / respons tidak dikenal — JANGAN signOut
                    err.textContent = '⚠ Verifikasi gagal. Refresh halaman.';
                    err.classList.remove('hidden');
                }

            } catch(unexpectedErr) {
                // Error tak terduga — kalau user masih ada di Firebase, biarkan masuk
                if (firebase.auth().currentUser) {
                    _authVerified = true;
                    gate.classList.add('hidden');
                    shell.classList.remove('hidden');
                    setTimeout(fetchData, 50);
                } else {
                    err.textContent = '⚠ Gagal verifikasi sesi. Coba refresh halaman.';
                    err.classList.remove('hidden');
                }
            } finally {
                _authInFlight = false;
            }
        });

        async function loginWithGoogle() {
            try { await firebase.auth().signInWithPopup(_provider); }
            catch(e) {
                if (e.code !== 'auth/popup-closed-by-user') {
                    const err = document.getElementById('auth-error');
                    err.textContent = '⚠ Gagal login. Periksa koneksi dan coba lagi.';
                    err.classList.remove('hidden');
                }
            }
        }

        Chart.register(ChartDataLabels);
        // [SEC-FIX] API_KEY dihapus — GAS_URL + auth sudah ada di atas

        // [SEC-02] XSS escape
        function esc(str) {
            return String(str == null ? '' : str)
                .replace(/&/g, '&amp;').replace(/</g, '&lt;')
                .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        window.onload = () => {
            // Auth flow sudah handle init — onAuthStateChanged yang panggil fetchData
        };

        async function fetchData() {
            try {
                // [SEC-FIX] Pakai GAS READ_SUMMARY — bukan Sheets API langsung
                const idToken = await getIdToken();
                const res = await gasRaw({ action: 'READ_SUMMARY', idToken });
                if (!res.ok) throw new Error(res.msg || 'Gagal memuat data');
                const rows        = res.rows     || [];
                const ovfRows     = res.overflow || []; // [OVF] data OVERFLOW

                // Budget dari Summary sheet (baris 88–99 = Januari–Desember)
                let budgetData = []; let totalBudgetSetahun = 0;
                for (let i = 88; i <= 99; i++) {
                    const bVal = cleanVal(rows[i]?.[1]);
                    budgetData.push(bVal);
                    totalBudgetSetahun += bVal;
                }

                let realData = new Array(12).fill(0);
                let totalIntensityCount = 0, annualNett = 0, totalPax = 0;
                let venueMap = {};

                // ── Proses Summary sheet rows (baris 26–200) ────────────────
                for (let i = 26; i < rows.length; i++) {
                    const r = rows[i]; if (!r || !r[9] || !r[13]) continue;
                    const sStat = r[13].toUpperCase();
                    const nett  = cleanVal(r[14]) / 1.21;
                    const pax   = cleanVal(r[11]);
                    const venue = (r[15] || 'TBD').toUpperCase().trim();
                    const pd = parseDateCell(r[9]); if (!pd) continue;
                    const m = pd.m;
                    if (sStat.includes("CONFIRM") || sStat.includes("DONE") || sStat.includes("TENTATIVE")) {
                        if (m >= 1 && m <= 12) {
                            realData[m-1] += nett;
                            annualNett += nett;
                            totalPax += pax;
                            totalIntensityCount++;
                            venueMap[venue] = (venueMap[venue] || 0) + 1;
                        }
                    }
                }

                // ── [OVF] Proses OVERFLOW rows ──────────────────────────────
                const MONTH_IDX = {JANUARI:1,FEBRUARI:2,MARET:3,APRIL:4,MEI:5,JUNI:6,
                                   JULI:7,AGUSTUS:8,SEPTEMBER:9,OKTOBER:10,NOVEMBER:11,DESEMBER:12};
                for (const ovf of ovfRows) {
                    const sStat = (ovf.status||'').toUpperCase();
                    const pax   = cleanVal(ovf.pax);
                    // [FIX-PRICE] ovf.price = harga per pax — harus dikali pax untuk dapat total
                    const nett  = (cleanVal(ovf.price) * pax) / 1.21;
                    const venue = (ovf.venue||'TBD').toUpperCase().trim();
                    const m     = MONTH_IDX[ovf.bulan] || 0;
                    if (!m) continue;
                    if (sStat.includes("CONFIRM") || sStat.includes("DONE") || sStat.includes("TENTATIVE")) {
                        realData[m-1] += nett;
                        annualNett    += nett;
                        totalPax      += pax;
                        totalIntensityCount++;
                        // Gabungkan ke venue yang sama di venueMap
                        venueMap[venue] = (venueMap[venue] || 0) + 1;
                    }
                }

                const achData = realData.map((v, i) => budgetData[i] > 0 ? Math.round((v / budgetData[i]) * 100) : 0);
                let totalAch = 0, activeMonths = 0;
                achData.forEach((v, i) => { if (realData[i] > 0 || budgetData[i] > 0) { totalAch += v; activeMonths++; } });

                document.getElementById('annual-progress').innerText = (totalBudgetSetahun > 0 ? Math.round((annualNett / totalBudgetSetahun) * 100) : 0) + "%";
                document.getElementById('avg-ach').innerText         = Math.round(totalAch / (activeMonths || 1)) + "%";
                document.getElementById('total-event-count').innerText = totalIntensityCount;
                document.getElementById('total-pax-count').innerText   = totalPax.toLocaleString('id-ID');
                document.getElementById('total-annual').innerText       = "Rp" + Math.round(annualNett).toLocaleString('id-ID');

                const venueContainer = document.getElementById('venue-list');
                let venueHtml = '';
                Object.entries(venueMap).sort((a,b) => b[1] - a[1]).forEach(([name, count]) => {
                    venueHtml += `
                        <a href="index.html?venue=${encodeURIComponent(name)}" class="bg-white/5 border border-white/10 rounded-xl p-2.5 flex justify-between items-center hover:bg-indigo-500/10 transition-all cursor-pointer">
                            <span class="text-[9px] font-bold text-slate-300 truncate pr-2 tracking-tight">${esc(name)}</span>
                            <span class="text-[11px] font-black text-indigo-400">${count}<span class="text-[7px] ml-0.5 opacity-60 italic">×</span></span>
                        </a>`;
                });
                venueContainer.innerHTML = venueHtml || '<p class="col-span-2 text-center text-[10px] py-4 opacity-20 italic">No Data</p>';

                renderChart(realData, budgetData, achData);
            } catch (e) { console.error('graphics fetchData error:', e); }
        }

        function renderChart(real, bud, ach) {
            const isNight = document.body.classList.contains('night-mode');
            const ctx = document.getElementById('revenueChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['JAN', 'FEB', 'MAR', 'APR', 'MEI', 'JUN', 'JUL', 'AGU', 'SEP', 'OKT', 'NOV', 'DES'],
                    datasets: [
                        {
                            label: 'Actual Nett', data: real, backgroundColor: '#6366f1', borderRadius: 4,
                            datalabels: { anchor: 'end', align: 'top', color: isNight ? '#818cf8' : '#4f46e5', font: { weight: '900', size: 9 }, formatter: (v, ctx) => ach[ctx.dataIndex] + '%' }
                        },
                        { label: 'Budget', data: bud, backgroundColor: isNight ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)', borderRadius: 4, datalabels: { display: false } }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true, grid: { display: false }, ticks: { display: false } },
                        x: { grid: { display: false }, ticks: { color: '#64748b', font: { size: 8, weight: '700' } } }
                    },
                    plugins: { legend: { position: 'bottom', labels: { color: isNight ? '#f8fafc' : '#1e293b', font: { size: 9 }, usePointStyle: true } } }
                }
            });
        }
        function cleanVal(s) { return parseFloat((s || "0").toString().replace(/[^0-9,-]+/g, "").replace(",", ".")) || 0; }

        function parseDateCell(raw) {
            if (!raw) return null;
            const s = raw.toString().trim();
            const slashMatch = s.match(/^(\d{1,2})\/(\d{1,2})(?:\/(\d{2,4}))?$/);
            if (slashMatch) return { d: parseInt(slashMatch[1]), m: parseInt(slashMatch[2]) };
            const isoMatch = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
            if (isoMatch) return { d: parseInt(isoMatch[3]), m: parseInt(isoMatch[2]) };
            const dashMatch = s.match(/^(\d{1,2})-(\d{1,2})-(\d{2,4})$/);
            if (dashMatch) return { d: parseInt(dashMatch[1]), m: parseInt(dashMatch[2]) };
            try { const dt = new Date(s); if (!isNaN(dt.getTime())) return { d: dt.getDate(), m: dt.getMonth() + 1 }; } catch(_) {}
            return null;
        }
        function toggleNightMode() {
            const isNight = document.body.classList.toggle('night-mode');
            localStorage.setItem('nightMode', isNight ? 'enabled' : 'disabled');
            if (firebase.auth().currentUser) fetchData();
        }
    </script>
    </div><!-- /app-shell -->
</body>
</html>
